<!DOCTYPE html>
<html>

<head>
  <title>Rock Paper Scissors</title>
</head>

<body>

  <h2>Rock Paper Scissors</h2>

  <div style="margin-bottom: 20px;display: flex; justify-content: center; align-items: center;">
    <button onclick="playGame('Rock')"
      style="margin: 5px; background-color: yellow; border: 2px solid black;">Rock</button>
    <button onclick="playGame('Paper')"
      style="margin: 5px; background-color: lightblue; border: 2px solid black;">Paper</button>
    <button onclick="playGame('Scissors')"
      style="margin: 5px; background-color: lightgreen; border: 2px solid black;">Scissors</button>
  </div>



  <p id="result"></p>

  <script>
    function playGame(playerMove) {

      const randomNumber = Math.random();

      let computerMove = '';

      if (randomNumber < 1 / 3) {
        computerMove = 'Rock';
      } else if (randomNumber < 2 / 3) {
        computerMove = 'Paper';
      } else {
        computerMove = 'Scissors';
      }

      let result = '';

      if (playerMove === 'Rock') {
        if (computerMove === 'Rock') {
          result = 'Tie';
        } else if (computerMove === 'Paper') {
          result = 'You Lose';
        } else {
          result = 'You Win';
        }
      }

      if (playerMove === 'Paper') {
        if (computerMove === 'Rock') {
          result = 'You Win';
        } else if (computerMove === 'Paper') {
          result = 'Tie';
        } else {
          result = 'You Lose';
        }
      }

      if (playerMove === 'Scissors') {
        if (computerMove === 'Rock') {
          result = 'You Lose';
        } else if (computerMove === 'Paper') {
          result = 'You Win';
        } else {
          result = 'Tie';
        }
      }

      document.getElementById('result').innerHTML =
        `You picked ${playerMove}. Computer picked ${computerMove}. <br><strong>${result}</strong>`;
    }
  </script>

</body>

</html>
